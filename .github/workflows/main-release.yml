name: Main Release

# Grant write permission for repository contents to allow pushing changes.
permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AOT: true
  TRIM: false
  EXTRA_OPTIMIZE: true
  BUILD_CONFIGURATION: Release   

jobs:
  setup-build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "./src/WebApi"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0
            
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore Dependencies
        run: dotnet restore "WebApi.csproj" -p:Configuration=${${{ env.BUILD_CONFIGURATION }}} -p:AOT=${${{ env.AOT }}} -p:Trim=${${{ env.TRIM }}}

      - name: Build Application
        run: dotnet build "WebApi.csproj" -c ${{ env.BUILD_CONFIGURATION }} -p:AOT=${${{ env.AOT }}} -p:Trim=${${{ env.TRIM }}} -p:ExtraOptimize=${${{ env.EXTRA_OPTIMIZE }}}

  build-push-image:
    needs: setup-build-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ./src/
          file: ./src/WebApi/Dockerfile
          push: true
          tags: ghcr.io/jonathanperis/rinha2-back-end-dotnet:latest
          platforms: linux/amd64,linux/arm64/v8          
          build-args: |
            AOT=${{ env.AOT }}
            TRIM=${{ env.TRIM }}
            EXTRA_OPTIMIZE=${{ env.EXTRA_OPTIMIZE }}
            BUILD_CONFIGURATION=${{ env.BUILD_CONFIGURATION }}

  container-test:
    needs: build-push-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Build and Run Docker Compose for Healthcheck Test
        run: |
          docker compose -f ./prod/docker-compose.yml up nginx -d
          sleep 10

      - name: Test Healthcheck Endpoint
        run: |
          for i in {1..20}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9999/healthz)
            if [ "$STATUS" -eq 200 ]; then
              echo "Healthcheck passed with status $STATUS"
              exit 0
            else
              echo "Healthcheck attempt $i failed with status $STATUS. Retrying..."
              sleep 2
            fi
          done
          echo "Healthcheck failed after 20 attempts."
          exit 1

  load-test:
    runs-on: ubuntu-latest
    needs: container-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
            fetch-depth: 0

      - name: Build and Run Docker Compose for Load Test
        run: |
          docker compose -f ./prod/docker-compose.yml up k6 --build --force-recreate 
          sleep 10

      # - name: Listing Files recursively
      #   run: find . -printf '%y %p\n'

      - name: Upload Stress Test Report Artifact
        uses: actions/upload-artifact@v7
        with:
          name: stress-test-report
          path: ./prod/conf/stress-test/reports/stress-test-report.html

